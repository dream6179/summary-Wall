<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摘要牆</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 頂部導覽列 -->
    <header class="navbar">
        <div class="nav-container">
            <h1 class="logo">摘要牆</h1>
            
            <!-- 搜尋框區塊 -->
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜尋摘要標題、內容或來源...">
                <button id="clear-search" class="hidden">&times;</button>
            </div>

            <div class="nav-status">
                <span class="pulse-icon"></span>
                <span id="update-time">即時連線中</span>
            </div>
        </div>

        <!-- 主題篩選分頁標籤列 -->
        <div class="filter-tabs-wrapper">
            <div class="filter-tabs" id="filter-tabs-container">
                <button class="tab active" data-tag="all">全部摘要</button>
                <button class="tab" data-tag="科技新知">科技新知</button>
                <button class="tab" data-tag="遊戲情報">遊戲情報</button>
                <button class="tab" data-tag="社群熱議">社群熱議</button>
                <button class="tab" data-tag="生活風格">生活風格</button>
                <button class="tab" data-tag="開發日誌">開發日誌</button>
            </div>
        </div>
    </header>

        <!-- 中間卡片瀑布流區域 -->
    <main class="wall-wrapper">
        <div id="wall-container" class="wall-grid">
            <!-- 卡片會塞在這裡 -->
        </div>
        
        <!-- 💡 新增這行：作為無限滾動的底部觸發點 (Sentinel) -->
        <div id="sentinel" class="loading-text hidden">
            <span class="pulse-icon" style="display:inline-block; margin-right:8px;"></span>
            正在載入更多摘要...
        </div>
    </main>

    <!-- 💡 新增：帶有紅點提示的懸浮回到頂部按鈕 -->
    <button id="back-to-top" class="btt-btn hidden" title="回到頂部">
        <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z" fill="currentColor"/>
        </svg>
        <!-- 紅點提示 -->
        <span id="new-data-badge" class="badge hidden"></span>
    </button>

    <script src="app.js"></script>
</body>
</html>
