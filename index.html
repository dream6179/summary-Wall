<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摘要牆</title>
    
    <!-- 💡 用 SVG Data URL 實現純 Emoji 網站圖標，輕量高質感 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">
    
    <!-- 標準搜尋引擎優化 (SEO) -->
    <meta name="description" content="即時摘要牆：匯整科技、遊戲、社群與開發日誌的精華資訊。">

    <!-- LINE, Discord, Facebook, Threads 分享預覽效果 (Open Graph) -->
    <meta property="og:title" content="摘要牆 - 你的即時資訊聚合中心">
    <meta property="og:description" content="現代感瀑布流排版、無限滾動、即時推播穿插，讓你一手掌握最新動態。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://你的專案名稱.pages.dev/">
    <meta property="og:image" content="https://你的專案名稱.pages.dev/preview.jpg"> 

    <!-- Twitter / X 分享預覽卡片 -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="摘要牆">
    <meta name="twitter:description" content="現代感瀑布流排版、無限滾動、即時推播穿插。">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <!-- 1. 完美對稱導覽列 (三欄 Grid 防禦置中版) -->
        <nav class="navbar">
            <div class="nav-container">
                <!-- 左側：網站名稱 -->
                <div class="logo">摘要牆</div>
                
                <!-- 中間：現代感搜尋框 -->
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜尋關鍵字、來源...">
                    <button id="clear-search" class="hidden">×</button>
                </div>
                
                <!-- 右側：齒輪按鈕 -->
                <div class="nav-right">
                    <button id="settings-btn" class="settings-gear-btn" title="系統設定">
                        <!-- 💡 ✅ 完美修復：換上 100% 絕對不會報錯的標準鋼鐵齒輪 SVG 路徑 -->
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l-.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </nav>

<!-- 導覽頁籤區 -->
<div class="tab-container">
  <button class="tab-btn active" data-tag="all">全部摘要</button>
  <button class="tab-btn" data-tag="google">焦點新聞</button>
  <button class="tab-btn" data-tag="tech">科技新知</button>
  
  <!-- 🎯 自訂特區：按鈕結合多選彈出面板 -->
  <div class="custom-tab-wrapper">
    <!-- 預設按鈕調整成「自訂」兩個字 -->
    <button class="tab-btn" id="custom-tab-btn" data-tag="custom">自訂</button>
    
    <!-- 👁️ 新型多選彈出勾選盒面板 -->
    <div id="custom-dropdown-menu" class="custom-dropdown-menu hidden">
      <div class="dropdown-header">
        <button id="custom-clear-btn" class="dropdown-clear-btn">🧹 清空已選</button>
      </div>
      <div class="dropdown-body">
        
        <!-- 🎮 遊戲與社群 -->
        <div class="dropdown-group-title">🎮 遊戲與社群</div>
        <label class="dropdown-item-label"><input type="checkbox" value="steam"> Steam 遊戲</label>
        <label class="dropdown-item-label"><input type="checkbox" value="hoyolab"> HoYoLAB</label>
        <label class="dropdown-item-label"><input type="checkbox" value="anime"> 動漫快訊</label>
        <label class="dropdown-item-label"><input type="checkbox" value="youtuber"> YouTuber 圈</label>
        <label class="dropdown-item-label"><input type="checkbox" value="influencer"> 網紅名人</label>
        <label class="dropdown-item-label"><input type="checkbox" value="threads"> Threads 趨勢</label>
        <label class="dropdown-item-label"><input type="checkbox" value="ig"> Instagram</label>
        <label class="dropdown-item-label"><input type="checkbox" value="line"> LINE 科技</label>

        <!-- 📱 科技與電信 -->
        <div class="dropdown-group-title">📱 科技與電信</div>
        <label class="dropdown-item-label"><input type="checkbox" value="fet"> 遠傳電信</label>
        <label class="dropdown-item-label"><input type="checkbox" value="cht"> 中華電信</label>
        <label class="dropdown-item-label"><input type="checkbox" value="twm"> 台灣大哥大</label>
        <label class="dropdown-item-label"><input type="checkbox" value="samsung"> Samsung</label>
        <label class="dropdown-item-label"><input type="checkbox" value="apple"> Apple</label>
        <label class="dropdown-item-label"><input type="checkbox" value="ai"> AI 浪潮</label>
        <label class="dropdown-item-label"><input type="checkbox" value="openai"> OpenAI</label>
        <label class="dropdown-item-label"><input type="checkbox" value="google_alert"> Google 核心</label>
        <label class="dropdown-item-label"><input type="checkbox" value="tech_3c"> 3C情報</label>
        <label class="dropdown-item-label"><input type="checkbox" value="mobile"> 手機通訊</label>

        <!-- 🚨 生活與重大突發 -->
        <div class="dropdown-group-title">🚨 生活與突發</div>
        <label class="dropdown-item-label"><input type="checkbox" value="quake"> 地震速報</label>
        <label class="dropdown-item-label"><input type="checkbox" value="typhoon"> 颱風動態</label>
        <label class="dropdown-item-label"><input type="checkbox" value="anti_fraud"> 165 防詐</label>
        <label class="dropdown-item-label"><input type="checkbox" value="transit"> 大眾運輸</label>
        <label class="dropdown-item-label"><input type="checkbox" value="accident"> 即時車禍</label>
        <label class="dropdown-item-label"><input type="checkbox" value="food_safety"> 食安追蹤</label>
        <label class="dropdown-item-label"><input type="checkbox" value="discount"> 好康優惠</label>
        <label class="dropdown-item-label"><input type="checkbox" value="travel"> 旅遊生活</label>
        <label class="dropdown-item-label"><input type="checkbox" value="movie"> 電影影集</label>
        <label class="dropdown-item-label"><input type="checkbox" value="netflix"> Netflix</label>

        <!-- 🌐 國際與財經 -->
        <div class="dropdown-group-title">🌐 全球與財經</div>
        <label class="dropdown-item-label"><input type="checkbox" value="world"> 世界大局</label>
        <label class="dropdown-item-label"><input type="checkbox" value="oil"> 石油能源</label>
        <label class="dropdown-item-label"><input type="checkbox" value="us"> 美國焦點</label>
        <label class="dropdown-item-label"><input type="checkbox" value="jp"> 日本情報</label>
        <label class="dropdown-item-label"><input type="checkbox" value="kr"> 韓國動態</label>
        <label class="dropdown-item-label"><input type="checkbox" value="cn"> 中国观察</label>

      </div>
    </div>
  </div>
</div>

    </header>

    <!-- 中間卡片瀑布流區域 -->
    <main class="wall-wrapper">
        <div id="wall-container" class="wall-grid">
            <!-- 卡片由 JavaScript 動態塞在這裡 -->
        </div>
        
        <!-- 無限滾動底部觸發點 -->
        <div id="sentinel" class="loading-text hidden">
            正在載入更多摘要...
        </div>
    </main>

    <!-- 帶有紅點提示的懸浮回到頂部按鈕 -->
    <button id="back-to-top" class="btt-btn hidden" title="回到頂部">
        <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z" fill="currentColor"/>
        </svg>
        <span id="new-data-badge" class="badge hidden"></span>
    </button>
    
    <!-- 新聞文章細節彈窗 -->
    <div id="article-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-header">
                <span id="modal-tag" class="card-tag">分類標籤</span>
                <h2 id="modal-title">文章標題載入中...</h2>
                <div class="modal-meta">
                    <span id="modal-source">來源</span> • <span id="modal-time">時間</span>
                </div>
            </div>
            <hr>
            <div class="modal-body">
                <div id="modal-snippet">這裡會顯示完整的文章內容與縮圖...</div>
            </div>
        </div>
    </div>

    <!-- 設定與開發者資訊彈窗 -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content" style="max-width: 450px;">
            <button class="modal-close">×</button>
            <div class="modal-header">
                <h2>系統設定與資訊</h2>
            </div>
            <hr>
            <div class="modal-body">
                <div style="background-color: #f8f9fa; padding: 16px; border-radius: 12px; margin-bottom: 24px;">
                    <h4 style="color: var(--accent-color); margin-bottom: 6px;">👨‍💻 開發者資訊</h4>
                    <p style="font-size: 0.95rem; color: var(--text-main); font-weight: 500;">本服務由 綠茶地瓜 維護</p>
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;">本服務專為公共場所消耗時間設計，整合多路自動化資訊流與智慧型廣告插播排版演算法。</p>
                </div>
                <button id="settings-share-btn" style="width: 100%; padding: 14px; background-color: var(--accent-color); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/>
                    </svg>
                    分享此網站
                </button>
            </div>
        </div>
    </div>

    <!-- 💬 左下角圓圈聊天按鈕 -->
<button id="chat-toggle-btn" title="開啟賽博聊天室">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
    </svg>
    <!-- 在線人數微型提示燈 -->
    <span id="chat-badge" class="hidden"></span>
</button>

<!-- 🚀 彈出式聊天太空艙 -->
<div id="chat-container" class="hidden">
    <!-- 頂部狀態列 -->
    <div class="chat-header">
        <div class="header-left">
            <span class="pulse-dot"></span>
            <span id="chat-status">📡 正在聯線太空艙...</span>
        </div>
        <button id="chat-close-x" title="收起">&times;</button>
    </div>
    
    <!-- 歷史訊息滾動特區 -->
    <div id="chat-box"></div>
    
    <!-- 底部輸入欄 -->
    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="傳送情報..." autocomplete="off">
        <button id="chat-send-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>

    <script src="app.js"></script>
</body>
</html>
