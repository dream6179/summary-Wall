<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摘要牆</title>
    <!-- 💡 用 SVG Data URL 實現純 Emoji 網站圖標 -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">
<!-- 標準搜尋引擎優化 (SEO) -->
<meta name="description" content="即時摘要牆：匯整科技、遊戲、社群與開發日誌的精華資訊。">

<!-- LINE, Discord, Facebook, Threads 分享預覽效果 (Open Graph) -->
<meta property="og:title" content="摘要牆 - 你的即時資訊聚合中心">
<meta property="og:description" content="現代感瀑布流排版、無限滾動、即時推播穿插，讓你一手掌握最新動態。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://你的專案名稱.pages.dev/">
<!-- 💡 預覽圖網址：建議放一張 1200x630 的圖片，分享時才會出現大圖 -->
<meta property="og:image" content="https://你的專案名稱.pages.dev/preview.jpg"> 

<!-- Twitter / X 分享預覽卡片 -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="摘要牆">
<meta name="twitter:description" content="現代感瀑布流排版、無限滾動、即時推播穿插。">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 1. 全新升級：完美對稱導覽列 -->
<nav class="navbar">
    <div class="nav-container">
        <!-- 左側：網站名稱 -->
        <div class="logo">摘要牆</div>
        
        <!-- 中間：現代感搜尋框 -->
        <div class="search-box">
            <input type="text" id="search-input" placeholder="搜尋關鍵字、來源...">
            <button id="clear-search" class="hidden">×</button>
        </div>
        
        <!-- 右側：齒輪按鈕 -->
        <div class="nav-right">
            <button id="settings-btn" class="settings-gear-btn" title="系統設定">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l-.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
            </button>
        </div>
    </div>
</nav>

<!-- 2. 全新引進：設定與開發者資訊彈窗 (沿用原有 Modal 核心) -->
<div id="settings-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content" style="max-width: 450px;"> <!-- 設定頁通常較窄，限縮寬度最精緻 -->
        <button class="modal-close">×</button>
        <div class="modal-header">
            <h2>系統設定與資訊</h2>
        </div>
        <hr>
        <div class="modal-body" style="white-space: normal;">
            <!-- 開發者資訊區塊 -->
            <div style="background-color: #f8f9fa; padding: 16px; border-radius: 12px; margin-bottom: 24px;">
                <h4 style="color: var(--accent-color); margin-bottom: 6px;">👨‍💻 開發者資訊</h4>
                <p style="font-size: 0.95rem; color: var(--text-main); font-weight: 500;">遠傳電信 門市特設技術專區</p>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;">本系統專為門市展示牆設計，整合多路自動化資訊流與智慧型廣告插播排版演算法。</p>
            </div>
            
            <!-- 操作按鈕區塊 -->
            <button id="settings-share-btn" style="width: 100%; padding: 14px; background-color: var(--accent-color); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/>
                </svg>
                分享此網站
            </button>
        </div>
    </div>
</div>

        <!-- 主題篩選分頁標籤列 -->
        <div class="filter-tabs-wrapper">
            <div class="filter-tabs" id="filter-tabs-container">
                <button class="tab active" data-tag="all">全部摘要</button>
                <button class="tab" data-tag="科技新知">科技新知</button>
                <button class="tab" data-tag="財經新聞">財經新聞</button>
                <button class="tab" data-tag="遊戲情報">遊戲情報</button>
                <button class="tab" data-tag="社群熱議">社群熱議</button>
                <button class="tab" data-tag="生活風格">生活風格</button>
                <button class="tab" data-tag="開發日誌">開發日誌</button>
                <button class="tab" data-tag="世界之外">世界之外</button>
            </div>
        </div>
    </header>

    <!-- 中間卡片瀑布流區域 -->
    <main class="wall-wrapper">
        <div id="wall-container" class="wall-grid">
            <!-- 卡片會塞在這裡 -->
        </div>
        
        <!-- 作為無限滾動的底部觸發點 (Sentinel) -->
        <div id="sentinel" class="loading-text hidden">
            <span class="pulse-icon" style="display:inline-block; margin-right:8px;"></span>
            正在載入更多摘要...
        </div>
    </main>

    <!-- 帶有紅點提示的懸浮回到頂部按鈕 -->
    <button id="back-to-top" class="btt-btn hidden" title="回到頂部">
        <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z" fill="currentColor"/>
        </svg>
        <!-- 紅點提示 -->
        <span id="new-data-badge" class="badge hidden"></span>
    </button>
    
        <!-- 💡 新增：點擊卡片彈出的完整文章視窗 -->
    <div id="article-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-header">
                <span id="modal-tag" class="card-tag">分類標籤</span>
                <h2 id="modal-title">文章標題載入中...</h2>
                <div class="modal-meta">
                    <span id="modal-source">來源</span> • <span id="modal-time">時間</span>
                </div>
            </div>
            <hr>
            <div class="modal-body">
                <p id="modal-snippet">這裡會顯示完整的文章內容...</p>
            </div>
        </div>
    </div>


    <script src="app.js"></script>
</body>
</html>
