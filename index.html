<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的摘要牆</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 頂部網站名稱導覽列 -->
    <header class="navbar">
        <div class="nav-container">
            <h1 class="logo">全球資訊<span>摘要牆</span></h1>
            <div class="nav-status">
                <span class="pulse-icon"></span>
                <span id="update-time">即時連線中</span>
            </div>
        </div>
    </header>

        <!-- 中間卡片摘要瀑布流區域 -->
    <main class="wall-wrapper">
        <div id="wall-container" class="wall-grid">
            <!-- JS 動態生成的卡片會被塞在這裡 -->
            <div class="loading-text">正在初始化摘要牆...</div>
        </div>
    </main>

    <!-- 💡 就是漏了這一行！記得加在 body 結束前 -->
    <script src="app.js"></script>
</body>
</html>
